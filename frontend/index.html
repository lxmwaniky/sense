<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>S.E.N.S.E. | Emergency Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --spider-red: #E22127;
            --spider-blue: #1A365D;
            --bg-dark: #0A0D14;
            --card-bg: rgba(20, 24, 33, 0.95);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #f7fafc;
            overflow: hidden;
            position: relative;
        }

        .cobweb {
            position: absolute;
            width: 180px;
            height: 180px;
            pointer-events: none;
            z-index: 2;
            opacity: 0.12;
            transition: opacity 0.5s ease;
        }
        .cobweb.top-left { top: 0; left: 0; }
        .cobweb.top-right { top: 0; right: 0; transform: scaleX(-1); }
        .cobweb.bottom-left { bottom: 0; left: 0; transform: scaleY(-1); }
        .cobweb.bottom-right { bottom: 0; right: 0; transform: scale(-1); }

        .sense-edge {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 1;
            box-shadow: inset 0 0 0px rgba(226, 33, 39, 0);
            transition: box-shadow 0.4s ease;
        }
        .sense-edge.active {
            box-shadow: inset 0 0 50px rgba(226, 33, 39, 0.4);
            animation: sense-alert 1.2s infinite ease-in-out;
        }

        @keyframes sense-alert {
            0%, 100% { box-shadow: inset 0 0 30px rgba(226, 33, 39, 0.25); }
            50% { box-shadow: inset 0 0 60px rgba(226, 33, 39, 0.55); }
        }

        .console-container {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px 24px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .header-section {
            margin-bottom: 24px;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .app-subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .button-wrapper {
            position: relative;
            margin: 32px auto;
            width: 140px;
            height: 140px;
        }

        #spidey-btn {
            position: relative;
            z-index: 5;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(226, 33, 39, 0.4);
            background: radial-gradient(circle, #e22127 0%, #ba1217 100%);
            color: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(226, 33, 39, 0.35);
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease;
        }

        #spidey-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(226, 33, 39, 0.5);
        }

        #spidey-btn:active {
            transform: scale(0.97);
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            margin-bottom: 6px;
            fill: #ffffff;
            opacity: 0.95;
            transition: transform 0.2s ease;
        }

        #spidey-btn:hover .btn-icon {
            transform: scale(1.05);
        }

        .btn-text {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: #4285F4;
            box-shadow: 0 0 8px #4285F4;
            transition: all 0.3s ease;
        }

        .status-badge.searching {
            border-color: rgba(251, 188, 5, 0.3);
            background: rgba(251, 188, 5, 0.03);
            color: #FBBC05;
            box-shadow: 0 0 15px rgba(251, 188, 5, 0.15);
        }
        .status-badge.searching .status-dot {
            background-color: #FBBC05;
            box-shadow: 0 0 10px #FBBC05;
            animation: pulse-dot 1s infinite alternate;
        }

        .status-badge.transmitting {
            border-color: rgba(226, 33, 39, 0.3);
            background: rgba(226, 33, 39, 0.03);
            color: var(--spider-red);
            box-shadow: 0 0 15px rgba(226, 33, 39, 0.15);
        }
        .status-badge.transmitting .status-dot {
            background-color: var(--spider-red);
            box-shadow: 0 0 10px var(--spider-red);
            animation: pulse-dot 0.5s infinite alternate;
        }

        .status-badge.ready {
            border-color: rgba(52, 168, 83, 0.3);
            background: rgba(52, 168, 83, 0.03);
            color: #34A853;
            box-shadow: 0 0 15px rgba(52, 168, 83, 0.15);
        }
        .status-badge.ready .status-dot {
            background-color: #34A853;
            box-shadow: 0 0 10px #34A853;
        }

        @keyframes pulse-dot {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .log-display {
            font-family: monospace;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.45);
            padding: 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.03);
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
            margin-bottom: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading #spidey-btn .btn-icon { display: none; }
        .loading #spidey-btn .spinner { display: block; }

        @media (max-width: 480px) {
            .console-container {
                padding: 24px 16px;
                max-width: 330px;
            }
            .button-wrapper {
                width: 120px;
                height: 120px;
                margin: 24px auto;
            }
        }
    </style>
</head>
<body>

    <svg class="cobweb top-left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 L100,0 M0,0 L0,100 M0,0 L80,80" stroke="currentColor" stroke-width="0.75" fill="none"/>
        <path d="M20,0 A20,20 0 0,1 0,20" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M40,0 A40,40 0 0,1 0,40" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M60,0 A60,60 0 0,1 0,60" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M80,0 A80,80 0 0,1 0,80" fill="none" stroke="currentColor" stroke-width="0.5"/>
    </svg>
    <svg class="cobweb top-right" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 L100,0 M0,0 L0,100 M0,0 L80,80" stroke="currentColor" stroke-width="0.75" fill="none"/>
        <path d="M20,0 A20,20 0 0,1 0,20" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M40,0 A40,40 0 0,1 0,40" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M60,0 A60,60 0 0,1 0,60" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M80,0 A80,80 0 0,1 0,80" fill="none" stroke="currentColor" stroke-width="0.5"/>
    </svg>
    <svg class="cobweb bottom-left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 L100,0 M0,0 L0,100 M0,0 L80,80" stroke="currentColor" stroke-width="0.75" fill="none"/>
        <path d="M20,0 A20,20 0 0,1 0,20" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M40,0 A40,40 0 0,1 0,40" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M60,0 A60,60 0 0,1 0,60" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M80,0 A80,80 0 0,1 0,80" fill="none" stroke="currentColor" stroke-width="0.5"/>
    </svg>
    <svg class="cobweb bottom-right" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 L100,0 M0,0 L0,100 M0,0 L80,80" stroke="currentColor" stroke-width="0.75" fill="none"/>
        <path d="M20,0 A20,20 0 0,1 0,20" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M40,0 A40,40 0 0,1 0,40" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M60,0 A60,60 0 0,1 0,60" fill="none" stroke="currentColor" stroke-width="0.5"/>
        <path d="M80,0 A80,80 0 0,1 0,80" fill="none" stroke="currentColor" stroke-width="0.5"/>
    </svg>

    <div class="sense-edge" id="spidey-sense-overlay"></div>

    <div class="console-container">
        <div class="header-section">
            <h1 class="app-title">S.E.N.S.E.</h1>
            <p class="app-subtitle">Emergency Protocol Engine</p>
        </div>

        <div class="status-badge ready" id="status-badge">
            <div class="status-dot"></div>
            <span id="status-label">STATUS: ONLINE</span>
        </div>

        <div class="button-wrapper">
            <button id="spidey-btn" type="button" aria-label="Send emergency signal">
                <div class="spinner" id="btn-spinner"></div>
                <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C11.5 2 11 3.5 11 5V6.5C11 6.8 11.2 7 11.5 7H12.5C12.8 7 13 6.8 13 6.5V5C13 3.5 12.5 2 12 2Z"/>
                    <path d="M12 8C9.2 8 7 10.2 7 13C7 14.5 7.6 15.8 8.7 16.8L6.2 19.3C5.8 19.7 5.8 20.3 6.2 20.7C6.6 21.1 7.2 21.1 7.6 20.7L10.1 18.2C10.7 18.7 11.3 19 12 19C12.7 19 13.3 18.7 13.9 18.2L16.4 20.7C16.8 21.1 17.4 21.1 17.8 20.7C18.2 20.3 18.2 19.7 17.8 19.3L15.3 16.8C16.4 15.8 17 14.5 17 13C17 10.2 14.8 8 12 8ZM12 16C10.3 16 9 14.7 9 13C9 11.3 10.3 10 12 10C13.7 10 15 11.3 15 13C15 14.7 13.7 16 12 16Z"/>
                    <path d="M5.5 8C4.5 6.5 2.5 5.5 1.5 5C1 4.8 0.5 5 0.2 5.5C-0.1 6 0 6.5 0.5 6.8C1.5 7.3 3.2 8.3 4.2 9.5C4.5 9.8 4.9 10 5.2 10C5.5 10 5.8 9.8 6 9.5C6.3 9 6 8.5 5.5 8Z"/>
                    <path d="M18.5 8C19.5 6.5 21.5 5.5 22.5 5C23 4.8 23.5 5 23.8 5.5C24.1 6 24 6.5 23.5 6.8C22.5 7.3 20.8 8.3 19.8 9.5C19.5 9.8 19.1 10 18.8 10C18.5 10 18.2 9.8 18 9.5C17.7 9 18 8.5 18.5 8Z"/>
                    <path d="M4.5 12C3.2 11.5 1.5 11.2 0.5 11C-0.1 10.9 -0.5 11.4 -0.5 12C-0.5 12.6 0 13 0.5 13.1C1.5 13.3 3.2 13.6 4.5 14C5 14.1 5.5 13.8 5.5 13C5.5 12.2 5 12.1 4.5 12Z"/>
                    <path d="M19.5 12C20.8 11.5 22.5 11.2 23.5 11C24.1 10.9 24.5 11.4 24.5 12C24.5 12.6 24 13 23.5 13.1C22.5 13.3 20.8 13.6 19.5 14C19 14.1 18.5 13.8 18.5 13C18.5 12.2 19 12.1 19.5 12Z"/>
                </svg>
                <span class="btn-text" id="btn-label">Emergency</span>
            </button>
        </div>

        <div class="log-display" id="log-display">Awaiting trigger...</div>
    </div>

<script>
    // TODO: Update configuration before production deployment
    const INGESTOR_URL = "http://localhost:8080/tingle";
    const API_KEY = "dev-secret-key"; 
    
    const btn = document.getElementById('spidey-btn');
    const btnSpinner = document.getElementById('btn-spinner');
    const btnLabel = document.getElementById('btn-label');
    const logDisplay = document.getElementById('log-display');
    const statusBadge = document.getElementById('status-badge');
    const statusLabel = document.getElementById('status-label');
    const spideySenseOverlay = document.getElementById('spidey-sense-overlay');

    // Manages badge classes and feedback logs
    function updateState(state, text, logText) {
        statusBadge.classList.remove('ready', 'searching', 'transmitting');
        
        if (state === 'searching') {
            statusBadge.classList.add('searching');
            btnLabel.innerText = "LOCATING...";
            btn.parentElement.classList.add('loading');
            spideySenseOverlay.classList.remove('active');
        } else if (state === 'transmitting') {
            statusBadge.classList.add('transmitting');
            btnLabel.innerText = "SENDING...";
            btn.parentElement.classList.add('loading');
            spideySenseOverlay.classList.add('active');
        } else {
            statusBadge.classList.add('ready');
            btnLabel.innerText = "EMERGENCY";
            btn.parentElement.classList.remove('loading');
            spideySenseOverlay.classList.remove('active');
        }

        if (text) statusLabel.innerText = text;
        if (logText) logDisplay.innerText = logText;
    }

    // Handles transmission to GCP ingestor service
    async function sendSignal(lat, lng) {
        updateState('transmitting', 'STATUS: BROADCASTING...', `Broadcasting location: ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
        try {
            const response = await fetch(INGESTOR_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({ lat, lng })
            });
            if (response.ok) {
                updateState('ready', 'STATUS: ONLINE', 'Signal sent successfully!');
            } else {
                updateState('ready', 'STATUS: OFFLINE', `Transmission failed: ${response.status}`);
            }
        } catch (err) {
            console.error("Network error:", err);
            updateState('ready', 'STATUS: OFFLINE', 'Connection issue. Check ingestor service.');
        }
    }

    btn.addEventListener('click', () => {
        updateState('searching', 'STATUS: ACQUIRING GPS...', 'Acquiring GPS lock...');

        if (!navigator.geolocation) {
            console.warn("Geolocation not supported. Using Mock.");
            setTimeout(() => sendSignal(-1.2863, 36.8172), 800);
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                sendSignal(pos.coords.latitude, pos.coords.longitude);
            },
            (err) => {
                console.warn("Geolocation blocked/failed. Error code:", err.code, "Message:", err.message, "Using Mock Location.");
                sendSignal(-1.2863, 36.8172); 
            },
            { 
                timeout: 10000, 
                enableHighAccuracy: true,
                maximumAge: 0 
            }
        );
    });
</script>
</body>
</html>
