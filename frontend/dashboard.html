<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.N.S.E. | Hero Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --bg-dark: #070913;
            --card-bg: rgba(20, 24, 33, 0.9);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100%;
            background-color: #0c0f1d;
        }

        .cobweb {
            position: absolute;
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.12;
        }

        .cobweb.top-left {
            top: 0;
            left: 0;
        }

        .cobweb.top-right {
            top: 0;
            right: 0;
            transform: scaleX(-1);
        }

        .stats-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: var(--card-bg);
            color: white;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            width: calc(100% - 40px);
            max-width: 300px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .hud-header {
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 10px;
        }

        .hud-title {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--google-red);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .hud-subtitle {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px;
            font-weight: 500;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.5);
        }

        .stat-value {
            font-family: monospace;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pulse-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--google-green);
            margin-right: 6px;
            animation: pulse-dot 1.5s infinite alternate;
        }

        @keyframes pulse-dot {
            0% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .stats-overlay {
                top: auto;
                bottom: 0;
                left: 0;
                width: 100%;
                max-width: 100%;
                border-radius: 16px 16px 0 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                padding: 20px;
            }

            #map {
                height: calc(100vh - 160px);
            }
        }
    </style>
</head>

<body>

    <svg class="cobweb top-left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 L100,0 M0,0 L0,100 M0,0 L80,80" stroke="currentColor" stroke-width="0.75" fill="none" />
        <path d="M20,0 A20,20 0 0,1 0,20" fill="none" stroke="currentColor" stroke-width="0.5" />
        <path d="M40,0 A40,40 0 0,1 0,40" fill="none" stroke="currentColor" stroke-width="0.5" />
        <path d="M60,0 A60,60 0 0,1 0,60" fill="none" stroke="currentColor" stroke-width="0.5" />
        <path d="M80,0 A80,80 0 0,1 0,80" fill="none" stroke="currentColor" stroke-width="0.5" />
    </svg>
    <svg class="cobweb top-right" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 L100,0 M0,0 L0,100 M0,0 L80,80" stroke="currentColor" stroke-width="0.75" fill="none" />
        <path d="M20,0 A20,20 0 0,1 0,20" fill="none" stroke="currentColor" stroke-width="0.5" />
        <path d="M40,0 A40,40 0 0,1 0,40" fill="none" stroke="currentColor" stroke-width="0.5" />
        <path d="M60,0 A60,60 0 0,1 0,60" fill="none" stroke="currentColor" stroke-width="0.5" />
        <path d="M80,0 A80,80 0 0,1 0,80" fill="none" stroke="currentColor" stroke-width="0.5" />
    </svg>

    <div class="stats-overlay">
        <div class="hud-header">
            <h2 class="hud-title">Active Feed</h2>
            <div class="hud-subtitle">Web-Tracker HUD Console</div>
        </div>
        <div class="stat-row">
            <span class="stat-label">Feed Status:</span>
            <span class="stat-value" style="display: flex; align-items: center;">
                <span class="pulse-indicator"></span>Listening
            </span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Last Ping:</span>
            <span class="stat-value" id="status">No signals yet</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Active Signals:</span>
            <span class="stat-value" id="signal-count">0</span>
        </div>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, connectFirestoreEmulator } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = { projectId: "sense-project" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") {
            connectFirestoreEmulator(db, "localhost", 8084);
            console.log("Routing dashboard to local Firestore emulator.");
        }

        let map;
        const beacons = [];
        let BeaconOverlay;

        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");
            BeaconOverlay = class extends google.maps.OverlayView {
                constructor(position, map) {
                    super();
                    this.position = position;
                    this.setMap(map);
                }

                onAdd() {
                    this.div = document.createElement('div');
                    this.div.style.position = 'absolute';
                    this.div.innerHTML = `
                        <div class="beacon-core"></div>
                        <div class="beacon-ring"></div>
                        <div class="beacon-ring-outer"></div>
                    `;

                    const styleId = 'beacon-styles';
                    if (!document.getElementById(styleId)) {
                        const style = document.createElement('style');
                        style.id = styleId;
                        style.innerHTML = `
                            .beacon-core {
                                width: 12px; height: 12px; background: var(--google-red, #EA4335); border-radius: 50%;
                                position: absolute; transform: translate(-50%, -50%);
                                box-shadow: 0 0 10px var(--google-red, #EA4335);
                                border: 2px solid #ffffff;
                            }
                            .beacon-ring {
                                width: 32px; height: 32px; border: 1.5px solid var(--google-red, #EA4335); border-radius: 50%;
                                position: absolute; transform: translate(-50%, -50%);
                                animation: beacon-pulse 2s infinite linear;
                                opacity: 0;
                            }
                            .beacon-ring-outer {
                                width: 54px; height: 54px; border: 1px dashed var(--google-blue, #4285F4); border-radius: 50%;
                                position: absolute; transform: translate(-50%, -50%);
                                animation: beacon-pulse 2s infinite linear;
                                animation-delay: 0.6s;
                                opacity: 0;
                            }
                            @keyframes beacon-pulse {
                                0% { transform: translate(-50%, -50%) scale(0.25); opacity: 0.9; }
                                100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
                            }
                        `;
                        document.head.appendChild(style);
                    }

                    this.getPanes().overlayMouseTarget.appendChild(this.div);
                }

                draw() {
                    const projection = this.getProjection();
                    const pos = projection.fromLatLngToDivPixel(this.position);
                    if (pos && this.div) {
                        this.div.style.left = pos.x + 'px';
                        this.div.style.top = pos.y + 'px';
                    }
                }

                onRemove() {
                    if (this.div) {
                        this.div.parentNode.removeChild(this.div);
                        this.div = null;
                    }
                }
            };

            map = new Map(document.getElementById("map"), {
                center: { lat: -1.2863, lng: 36.8172 },
                zoom: 13,
                mapId: "SENSE_DASHBOARD_1",
                styles: [
                    { "elementType": "geometry", "stylers": [{ "color": "#0f1423" }] },
                    { "elementType": "labels.text.fill", "stylers": [{ "color": "#637b9d" }] },
                    { "elementType": "labels.text.stroke", "stylers": [{ "color": "#0b0e17" }] },
                    { "featureType": "administrative", "elementType": "geometry.stroke", "stylers": [{ "color": "#1f2940" }] },
                    { "featureType": "landscape.natural", "elementType": "geometry", "stylers": [{ "color": "#0d1220" }] },
                    { "featureType": "poi", "elementType": "geometry", "stylers": [{ "color": "#121a2e" }] },
                    { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#637b9d" }] },
                    { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#1b243b" }] },
                    { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#131b2e" }] },
                    { "featureType": "road.highway", "elementType": "geometry", "stylers": [{ "color": "#EA4335" }, { "weight": 0.5 }, { "opacity": 0.4 }] },
                    { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#080c14" }] }
                ]
            });

            startListening();
        }

        function startListening() {
            const tinglesCol = collection(db, "tingles");
            const statusEl = document.getElementById("status");
            const countEl = document.getElementById("signal-count");

            onSnapshot(tinglesCol, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        const pos = new google.maps.LatLng(data.lat, data.lng);
                        if (BeaconOverlay) {
                            const beacon = new BeaconOverlay(pos, map);
                            beacons.push(beacon);
                        }
                        statusEl.innerText = `${new Date().toLocaleTimeString()}`;
                    }
                });
                countEl.innerText = snapshot.size;
            });
        }

        (function (g) {
            var db, f, ca, m, p, q, t, s, u, v, a, b, e = function () { window.google.maps.importLibrary = function (a) { return Promise.resolve(google.maps[a]) } };
            if (g.google && g.google.maps) e();
            else {
                f = function (a, b, d, h) { var l = document.getElementsByTagName("script")[0]; l.parentNode.insertBefore(a, l) };
                ca = function (a, b) { var d = document.createElement("script"); d.src = a; d.async = !0; d.defer = !0; f(d) };
                g.google = g.google || {};
                g.google.maps = g.google.maps || {};
                var key = localStorage.getItem("GOOGLE_MAPS_API_KEY");
                if (!key) {
                    key = prompt("Please enter your Google Maps API Key:");
                    if (key) {
                        localStorage.setItem("GOOGLE_MAPS_API_KEY", key.trim());
                    }
                }
                ca("https://maps.googleapis.com/maps/api/js?key=" + (key || "YOUR_API_KEY") + "&callback=initMap");
                e();
            }
        })(window);

        window.initMap = initMap;
    </script>
</body>

</html>
